<html>
    <head>
        <meta charset="UTF-8">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <style>
            .negrito {
                font-weight: bold;
            }
            .text-blue {
                color: blue;
            }
        </style>
        <script type="text/javascript">
            function clique() {
                $("p").toggleClass("negrito text-blue")
            }
        </script>
    </head>
    <body>
        <p class="negrito">Parágrafo em negrito</p>
        <p class="text-blue">Parágrafo</p>
        <p class="negrito">Parágrafo em negrito</p>
        <button onclick="clique()">Ok</button>
    </body>
</html>
