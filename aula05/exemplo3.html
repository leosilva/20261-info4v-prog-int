<html>
    <head>
        <meta charset="UTF-8">
        <script type="text/javascript">
            function clique() {
                let titulo = document.createElement("h1")
                titulo.innerHTML = "Programacao para Internet"
                let div = document.querySelector("#div1")
                div.appendChild(titulo)
            }
        </script>
    </head>
    <body>
        <div id="div1"></div>
        <button onclick="clique()">Ok</button>
    </body>
</html>
