<html>
    <head>
        <meta charset="UTF-8">
        <script type="text/javascript">
            function clique() {
                let elemento = document.querySelector("#paragrafo")
                elemento.remove()
            }
        </script>
    </head>
    <body>
        <p id="paragrafo">Algum parágrafo</p>
        <button onclick="clique()">Ok</button>
    </body>
</html>
